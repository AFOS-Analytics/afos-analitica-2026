<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a3d8f 0%, #0F52BA 40%, #1a6edb 100%);
    font-family: 'Segoe UI', 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    filter: blur(80px);
    top: -100px;
    right: -50px;
  }

  .glow2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    filter: blur(60px);
    bottom: -80px;
    left: -30px;
  }

  .content {
    text-align: center;
    color: white;
    z-index: 1;
    padding: 0 80px;
  }

  .logo {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 16px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .tagline {
    font-size: 24px;
    font-weight: 400;
    opacity: 0.9;
    line-height: 1.4;
    margin-bottom: 40px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  .stats {
    display: flex;
    gap: 48px;
    justify-content: center;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-size: 42px;
    font-weight: 800;
    display: block;
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }

  .stat-label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin: 0 auto 40px;
  }

  .badge {
    display: inline-block;
    margin-top: 32px;
    padding: 8px 20px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo">AFOS Analytics</div>
    <div class="divider"></div>
    <div class="tagline">Real-time cross-referencing of prediction markets<br>and electoral polls</div>
    <div class="stats">
      <div class="stat">
        <span class="stat-number">14+</span>
        <div class="stat-label">Countries</div>
      </div>
      <div class="stat">
        <span class="stat-number">400+</span>
        <div class="stat-label">Sources</div>
      </div>
      <div class="stat">
        <span class="stat-number">20+</span>
        <div class="stat-label">Languages</div>
      </div>
    </div>
    <div class="badge">Open Source · Apache 2.0</div>
  </div>
</body>
</html>
