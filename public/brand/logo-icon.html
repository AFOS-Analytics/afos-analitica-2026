<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 256px;
    height: 256px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .logo {
    width: 256px;
    height: 256px;
    border-radius: 56px;
    background: linear-gradient(135deg, #0a3d8f 0%, #0F52BA 50%, #1a6edb 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    font-weight: 900;
    letter-spacing: 2px;
    box-shadow: 0 8px 32px rgba(15, 82, 186, 0.25);
  }
  .top { font-size: 84px; line-height: 1; margin-bottom: -8px; }
  .bot { font-size: 84px; line-height: 1; }
</style>
</head>
<body>
  <div class="logo">
    <div class="top">AF</div>
    <div class="bot">OS</div>
  </div>
</body>
</html>
