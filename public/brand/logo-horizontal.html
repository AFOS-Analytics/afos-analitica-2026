<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    padding: 20px;
  }
  .wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .icon {
    width: 120px;
    height: 120px;
    border-radius: 26px;
    background: linear-gradient(135deg, #0a3d8f 0%, #0F52BA 50%, #1a6edb 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(15, 82, 186, 0.25);
    flex-shrink: 0;
  }
  .icon .t { font-size: 40px; line-height: 1; margin-bottom: -4px; }
  .icon .b { font-size: 40px; line-height: 1; }

  .text {
    display: flex;
    flex-direction: column;
  }
  .name {
    font-size: 48px;
    font-weight: 800;
    color: #0F52BA;
    letter-spacing: -1px;
    line-height: 1;
  }
  .tagline {
    font-size: 16px;
    color: #666;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <div class="t">AF</div>
      <div class="b">OS</div>
    </div>
    <div class="text">
      <div class="name">AFOS Analytics</div>
      <div class="tagline">Prediction markets × Electoral polls</div>
    </div>
  </div>
</body>
</html>
