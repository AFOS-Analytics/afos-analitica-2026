name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on new commits to the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build with placeholder env vars — verifies the project compiles
      # without exposing secrets. Real values are set on Vercel.
      - name: Build (compile only)
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          KV_REST_API_URL: https://placeholder.upstash.io
          KV_REST_API_TOKEN: placeholder
          CRON_SECRET: placeholder
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Run AFOS Daily edge case tests
        run: npx tsx scripts/test-afos-daily-edge-cases.ts
