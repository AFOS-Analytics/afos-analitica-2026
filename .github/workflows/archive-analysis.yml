name: Archive Analysis Snapshots

on:
  push:
    branches: [main]
    paths:
      - 'public/analysis-data.json'
      - 'public/analysis-criteriosa.json'
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: archive-analysis
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -e
          for f in public/analysis-data.json public/analysis-criteriosa.json; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::arquivo ausente"
              exit 1
            fi
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error file=$f::JSON inválido"
              exit 1
            fi
            echo "✓ $f válido ($(wc -c < "$f") bytes)"
          done

      - name: Derive archive date per file
        id: meta
        run: |
          set -e
          # Cada arquivo deriva sua própria data a partir do updatedAt (DD/MM/YYYY → YYYY-MM-DD)
          derive() {
            local file="$1"
            local raw
            raw=$(jq -r '.updatedAt // empty' "$file")
            if [[ "$raw" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{4}) ]]; then
              echo "${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
            elif [[ "$raw" =~ ^([0-9]{4})-([0-9]{2})-([0-9]{2}) ]]; then
              echo "${BASH_REMATCH[1]}-${BASH_REMATCH[2]}-${BASH_REMATCH[3]}"
            else
              date -u +%Y-%m-%d
            fi
          }
          CARDS_DATE=$(derive public/analysis-data.json)
          CRIT_DATE=$(derive public/analysis-criteriosa.json)
          echo "cards_date=$CARDS_DATE" >> "$GITHUB_OUTPUT"
          echo "crit_date=$CRIT_DATE" >> "$GITHUB_OUTPUT"
          echo "Cards → archive/$CARDS_DATE/"
          echo "Criteriosa → archive/$CRIT_DATE/"

      - name: Archive to branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARDS_DATE: ${{ steps.meta.outputs.cards_date }}
          CRIT_DATE: ${{ steps.meta.outputs.crit_date }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          mkdir -p /tmp/snap
          cp public/analysis-data.json /tmp/snap/analysis-cards.json
          cp public/analysis-criteriosa.json /tmp/snap/analysis-criteriosa.json

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          cd /tmp

          if git clone --depth 1 --branch archive "$REMOTE" archive-wt 2>/dev/null; then
            echo "✓ archive branch exists, cloned"
          else
            echo "✓ archive branch missing, creating orphan"
            git clone --depth 1 "$REMOTE" archive-wt
            cd archive-wt
            git checkout --orphan archive
            git rm -rf . > /dev/null 2>&1 || true
            cat > README.md <<'EOF'
          # AFOS Analytics — Archive Branch

          Snapshots diários de análises (cards + criteriosa) preservados automaticamente.
          Gerado pelo workflow `.github/workflows/archive-analysis.yml`.

          **Não editar manualmente** — alterações serão sobrescritas.

          ## Estrutura

          ```
          archive/
          └── YYYY-MM-DD/
              ├── analysis-cards.json
              └── analysis-criteriosa.json
          ```
          EOF
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "init: archive branch"
            git push -u origin archive
            cd ..
          fi

          cd archive-wt
          mkdir -p "archive/$CARDS_DATE" "archive/$CRIT_DATE"
          cp /tmp/snap/analysis-cards.json "archive/$CARDS_DATE/analysis-cards.json"
          cp /tmp/snap/analysis-criteriosa.json "archive/$CRIT_DATE/analysis-criteriosa.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/

          if git diff --cached --quiet; then
            echo "::notice::Snapshot idêntico ao existente — nada a commitar"
          else
            if [ "$CARDS_DATE" = "$CRIT_DATE" ]; then
              MSG="archive: $CARDS_DATE"
            else
              MSG="archive: cards=$CARDS_DATE criteriosa=$CRIT_DATE"
            fi
            git commit -m "$MSG"
            git push origin archive
            echo "::notice::$MSG publicado em branch archive"
          fi
