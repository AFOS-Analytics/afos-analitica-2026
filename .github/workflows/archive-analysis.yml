name: Archive Analysis Snapshots

on:
  push:
    branches: [main]
    paths:
      - 'public/analysis-data.json'
      - 'public/analysis-criteriosa.json'
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: archive-analysis
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive archive date per file
        id: meta
        run: |
          set -e
          derive() {
            local raw
            raw=$(jq -r '.updatedAt // empty' "$1")
            if [[ "$raw" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{4}) ]]; then
              echo "${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
            else
              date -u +%Y-%m-%d
            fi
          }
          CARDS_DATE=$(derive public/analysis-data.json)
          CRIT_DATE=$(derive public/analysis-criteriosa.json)
          echo "cards_date=$CARDS_DATE" >> "$GITHUB_OUTPUT"
          echo "crit_date=$CRIT_DATE" >> "$GITHUB_OUTPUT"
          echo "Cards → archive/$CARDS_DATE/ | Criteriosa → archive/$CRIT_DATE/"

      - name: Archive to branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARDS_DATE: ${{ steps.meta.outputs.cards_date }}
          CRIT_DATE: ${{ steps.meta.outputs.crit_date }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          mkdir -p /tmp/snap
          cp public/analysis-data.json /tmp/snap/analysis-cards.json
          cp public/analysis-criteriosa.json /tmp/snap/analysis-criteriosa.json

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          cd /tmp

          if git clone --depth 1 --branch archive "$REMOTE" archive-wt 2>/dev/null; then
            echo "✓ archive branch cloned"
          else
            echo "✓ archive branch missing, creating orphan"
            git clone --depth 1 "$REMOTE" archive-wt
            cd archive-wt
            git checkout --orphan archive
            git rm -rf . > /dev/null 2>&1 || true
            cat > README.md <<'EOF'
          # AFOS Analytics — Archive Branch

          Snapshots diários de análises preservados automaticamente.
          Gerado por `.github/workflows/archive-analysis.yml` — não editar.

          Estrutura: `archive/YYYY-MM-DD/analysis-{cards,criteriosa}.json`
          EOF
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "init: archive branch"
            git push -u origin archive
            cd ..
          fi

          cd archive-wt
          mkdir -p "archive/$CARDS_DATE" "archive/$CRIT_DATE"
          cp /tmp/snap/analysis-cards.json "archive/$CARDS_DATE/analysis-cards.json"
          cp /tmp/snap/analysis-criteriosa.json "archive/$CRIT_DATE/analysis-criteriosa.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/

          if git diff --cached --quiet; then
            echo "::notice::Snapshot idêntico — nada a commitar"
          else
            MSG=$([ "$CARDS_DATE" = "$CRIT_DATE" ] \
              && echo "archive: $CARDS_DATE" \
              || echo "archive: cards=$CARDS_DATE criteriosa=$CRIT_DATE")
            git commit -m "$MSG"
            git push origin archive
            echo "::notice::$MSG publicado"
          fi
